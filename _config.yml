title: Magic Marco
description: Close-up magician for weddings, parties, corporate functions and special events.
social_image: /img/about/5.jpg
url: https://magicmarco.co.uk
baseurl: ""
#url: http://localhost:4000

permalink: pretty
safe: true
markdown_ext: "markdown,mkdown,mkdn,mkd,md"
markdown: kramdown

kramdown:
    smart_quotes:  ["apos", "apos", "ldquo", "rdquo"]
    html_to_native: true

encoding: utf-8

# Use this for production
sass:
    style: compressed
exclude:
  - .github
  - .scss
  - .bundle
  - .jekyll-cache
  - Gemfile
  - Gemfile.lock
  - README.md
  - CONTENT_FACT_CHECK.md
  - EDITORIAL_STYLE_GUIDE.md
  - SITE_IMPROVEMENT_PLAN.md
  - node_modules
  - gruntfile.js
  - package.json
  - scripts
  - vendor


collections:
  card:
    output: true
