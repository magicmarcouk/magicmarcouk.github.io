<div class="w3-center w3-padding" role="group" aria-label="Photo gallery controls">
    <button type="button" class="w3-button w3-black" onclick="changeSlide(-1)">Previous photo</button>
    <button type="button" class="w3-button w3-black" onclick="changeSlide(1)">Next photo</button>
</div>

<script>
var slideIndex = 1;
showSlide(slideIndex);

function changeSlide(change) {
    showSlide(slideIndex += change);
}

function showSlide(index) {
    var slides = document.getElementsByClassName('mySlides');
    var i;
    if (!slides.length) return;
    if (index > slides.length) slideIndex = 1;
    if (index < 1) slideIndex = slides.length;
    for (i = 0; i < slides.length; i++) {
        slides[i].style.display = 'none';
    }
    slides[slideIndex - 1].style.display = 'block';
}
</script>
